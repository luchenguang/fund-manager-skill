<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>基金分析报告</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif; background: #f0f2f5; color: #333; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        /* ===== 头部美化 ===== */
        .header { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); 
            color: white; 
            padding: 40px 30px; 
            border-radius: 16px; 
            margin-bottom: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: headerShine 8s ease-in-out infinite;
        }
        @keyframes headerShine {
            0%, 100% { transform: translate(-30%, -30%); }
            50% { transform: translate(30%, 30%); }
        }
        .header h1 { font-size: 2.2em; margin-bottom: 12px; font-weight: 600; letter-spacing: 1px; }
        .header p { font-size: 1em; opacity: 0.85; font-weight: 300; }

        /* ===== 组合切换器 ===== */
        .pool-switcher { margin-bottom: 20px; }
        .pool-tabs { display: flex; gap: 12px; flex-wrap: wrap; }
        .pool-tab { 
            padding: 12px 24px; 
            border: none; 
            background: white; 
            color: #5a6b7c; 
            font-size: 0.95em; 
            font-weight: 500; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pool-tab:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
        }
        .pool-tab.active { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .pool-tab .pool-count { font-size: 0.85em; opacity: 0.8; margin-left: 4px; }

        /* ===== 摘要区域 ===== */
        .summary { 
            background: white; 
            padding: 28px; 
            border-radius: 16px; 
            margin-bottom: 24px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .summary h2 { 
            color: #1a1a2e; 
            margin-bottom: 24px; 
            font-size: 1.6em; 
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .summary h2::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, #667eea, #764ba2);
            border-radius: 2px;
        }

        /* ===== 统计卡片 - 渐变边框 ===== */
        .summary-stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 16px; 
            margin-bottom: 28px;
        }
        .stat-item { 
            text-align: center; 
            padding: 20px 16px; 
            background: linear-gradient(135deg, #f8f9fc 0%, #f0f2f5 100%);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .stat-item:hover {
            transform: translateY(-4px);
        }
        .stat-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }
        .stat-item .label { 
            display: block; 
            font-size: 0.85em; 
            color: #8898aa; 
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-item .value { 
            font-size: 1.6em; 
            font-weight: 700; 
            color: #1a1a2e;
        }

        /* ===== 表格美化 ===== */
        .portfolio-funds-table-wrapper {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .portfolio-funds-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.95em; 
        }
        .portfolio-funds-table thead {
            background: linear-gradient(135deg, #f8f9fc 0%, #f0f2f5 100%);
        }
        .portfolio-funds-table th { 
            padding: 16px 12px; 
            text-align: left; 
            font-weight: 600; 
            color: #5a6b7c; 
            border-bottom: 2px solid #e8eaf0;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .portfolio-funds-table th[style*="cursor"] {
            cursor: pointer;
            user-select: none;
        }
        .portfolio-funds-table th[style*="cursor"]:hover {
            color: #667eea;
        }
        .portfolio-funds-table td { 
            padding: 14px 12px; 
            border-bottom: 1px solid #f0f2f5;
        }
        .portfolio-funds-table tbody tr {
            transition: background 0.2s ease;
        }
        .portfolio-funds-table tbody tr:hover { 
            background: linear-gradient(90deg, #f8f9fc 0%, #f5f7fa 100%);
        }
        .portfolio-funds-table tbody tr:last-child td {
            border-bottom: none;
        }
        .portfolio-funds-table .fund-code { 
            font-weight: 600; 
            color: #8898aa; 
        }
        .portfolio-funds-table .fund-name { 
            font-weight: 500; 
            color: #3d4a5c; 
        }

        /* ===== 颜色类 ===== */
        .positive { color: #e74c3c !important; font-weight: 600; }
        .negative { color: #27ae60 !important; font-weight: 600; }
        .neutral { color: #f39c12 !important; font-weight: 600; }

        /* ===== 基金卡片 ===== */
        .funds-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(480px, 1fr)); 
            gap: 20px; 
        }
        .fund-card { 
            background: white; 
            border-radius: 16px; 
            padding: 24px; 
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }
        .fund-card:hover { 
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.1);
            border-color: rgba(102, 126, 234, 0.2);
        }

        .fund-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            padding-bottom: 16px; 
            border-bottom: 1px solid #e8eaf0;
        }
        .fund-header h3 { 
            color: #1a1a2e; 
            font-size: 1.3em; 
            font-weight: 600;
        }
        .data-source { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.75em;
            font-weight: 500;
        }

        .info-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            margin-bottom: 20px; 
        }
        .info-item { 
            padding: 14px; 
            background: #f8f9fc; 
            border-radius: 10px;
        }
        .info-item .label { 
            display: block; 
            font-size: 0.8em; 
            color: #8898aa; 
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .info-item .value { 
            font-size: 1.15em; 
            font-weight: 600; 
            color: #1a1a2e; 
        }

        .status-info { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 20px; 
        }
        .status-item { 
            flex: 1; 
            text-align: center; 
            padding: 12px; 
            background: #f8f9fc; 
            border-radius: 10px;
        }
        .status-item .label { 
            display: block; 
            font-size: 0.75em; 
            color: #8898aa; 
            margin-bottom: 4px;
        }
        .status-badge { 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.8em; 
            font-weight: 600; 
        }
        .status-badge.open { 
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%); 
            color: #155724; 
        }
        .status-badge.close { 
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%); 
            color: #721c24; 
        }

        .history-table-container { 
            margin-top: 20px; 
        }
        .history-table-container h4 { 
            color: #1a1a2e; 
            margin-bottom: 16px; 
            font-size: 1.1em;
            font-weight: 600;
        }
        .history-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.9em; 
        }
        .history-table thead {
            background: linear-gradient(135deg, #f8f9fc 0%, #f0f2f5 100%);
        }
        .history-table th { 
            padding: 12px; 
            text-align: left; 
            font-weight: 600; 
            color: #5a6b7c; 
            border-bottom: 2px solid #e8eaf0;
        }
        .history-table td { 
            padding: 12px; 
            border-bottom: 1px solid #f0f2f5;
        }
        .history-table .period { 
            font-weight: 500; 
            color: #5a6b7c; 
        }
        .history-table tr:hover { 
            background: #f8f9fc;
        }

        /* ===== 建议区域 ===== */
        .suggestions { 
            background: white; 
            padding: 28px; 
            border-radius: 16px; 
            margin-top: 24px; 
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .suggestions h3 { 
            color: #1a1a2e; 
            margin-bottom: 20px; 
            font-size: 1.3em; 
            font-weight: 600;
        }
        .suggestion-item { 
            padding: 14px 18px; 
            margin-bottom: 12px; 
            background: linear-gradient(135deg, #f8f9fc 0%, #f0f2f5 100%);
            border-radius: 10px; 
            border-left: 3px solid #667eea;
            color: #5a6b7c;
        }

        /* ===== 底部 ===== */
        .footer { 
            text-align: center; 
            color: #a0a8b8; 
            margin-top: 40px; 
            padding: 24px; 
            font-size: 0.9em; 
        }
        .footer p { margin: 8px 0; }

        /* ===== 标题区域 ===== */
        .section-title {
            color: #1a1a2e;
            margin-bottom: 20px;
            font-size: 1.4em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, #667eea, #764ba2);
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            .info-grid { grid-template-columns: 1fr; }
            .status-info { flex-direction: column; }
            .funds-container { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.6em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 基金投资组合分析报告</h1>
            <p>专业投资分析 · 风险提示：投资有风险，决策需谨慎</p>
        </div>

        <div class="summary">
            <div class="pool-switcher" id="pool-switcher">
                <div class="pool-tabs" id="pool-tabs"></div>
            </div>
            
            <h2>📈 <span id="current-pool-name">组合概览</span> <span id="report-date"></span></h2>
            
            <div class="summary-stats">
                <div class="stat-item">
                    <span class="label">总基金数</span>
                    <span class="value" id="total-funds">--</span>
                </div>
                <div class="stat-item">
                    <span class="label">成功获取</span>
                    <span class="value" id="successful-funds">--</span>
                </div>
                <div class="stat-item">
                    <span class="label">总金额(元)</span>
                    <span class="value" id="total-amount">--</span>
                </div>
                <div class="stat-item">
                    <span class="label">总收益(元)</span>
                    <span id="total-profit">--</span>
                </div>
                <div class="stat-item">
                    <span class="label">平均涨跌幅</span>
                    <span class="value" id="portfolio-change">--</span>
                </div>
            </div>
            
            <div class="portfolio-funds-table-wrapper">
                <table class="portfolio-funds-table" id="portfolio-table">
                    <thead>
                        <tr>
                            <th>基金代码</th>
                            <th>基金名称</th>
                            <th onclick="sortTable(2)" style="cursor:pointer">金额(元) <span class="sort-icon">↕</span></th>
                            <th onclick="sortTable(3)" style="cursor:pointer">收益(元) <span class="sort-icon">↕</span></th>
                            <th onclick="sortTable(4)" style="cursor:pointer">占比(%) <span class="sort-icon">↕</span></th>
                            <th onclick="sortTable(5)" style="cursor:pointer">昨日涨跌幅 <span class="sort-icon">↕</span></th>
                            <th onclick="sortTable(6)" style="cursor:pointer">今日涨跌幅 <span class="sort-icon">↕</span></th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>

        <h2 class="section-title">💰 基金详细信息 (<span id="timestamp"></span>)</h2>
        <div class="funds-container">
        </div>

        <div class="footer">
            <p>报告生成时间: <span id="timestamp"></span></p>
            <p>数据仅供参考，投资决策需谨慎考虑个人风险承受能力</p>
            <p>© 2026 基金投资分析系统 | 专业 · 智能 · 可靠</p>
        </div>
    </div>

    <script>
        let poolData = {};
        let currentPool = null;

        function switchPool(poolName) {
            const data = poolData[poolName];
            if (!data) return;

            currentPool = poolName;

            document.querySelectorAll('.pool-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.pool === poolName);
            });

            document.getElementById('current-pool-name').textContent = poolName;

            const summary = data.summary;
            document.getElementById('total-funds').textContent = summary.total_funds;
            document.getElementById('successful-funds').textContent = summary.successful_funds;
            
            let totalAmount = 0;
            let totalProfit = 0;
            let hasTodayCount = 0;
            let hasYesterdayCount = 0;
            
            for (const fund of data.funds) {
                if (fund.fund_info && fund.fund_info.amount) {
                    const amount = fund.fund_info.amount;
                    totalAmount += amount;
                    
                    const todayData = fund.current_info ? fund.current_info.今日涨跌幅 || {} : {};
                    const yesterdayData = fund.current_info ? fund.current_info.昨日涨跌幅 || {} : {};
                    const todayValue = todayData.value || null;
                    const yesterdayValue = yesterdayData.value || null;
                    
                    if (todayValue && todayValue !== '--') hasTodayCount++;
                    if (yesterdayValue && yesterdayValue !== '--') hasYesterdayCount++;
                }
            }
            
            const validCount = hasTodayCount + hasYesterdayCount;
            const useToday = hasTodayCount > validCount / 2;
            
            for (const fund of data.funds) {
                if (fund.fund_info && fund.fund_info.amount) {
                    const amount = fund.fund_info.amount;
                    const todayData = fund.current_info ? fund.current_info.今日涨跌幅 || {} : {};
                    const yesterdayData = fund.current_info ? fund.current_info.昨日涨跌幅 || {} : {};
                    const todayValue = todayData.value || null;
                    const yesterdayValue = yesterdayData.value || null;
                    
                    let percent = 0;
                    if (useToday && todayValue && todayValue !== '--') {
                        try {
                            percent = parseFloat(todayValue.replace('%', '').replace('+', ''));
                        } catch(e) {}
                    } else if (yesterdayValue && yesterdayValue !== '--') {
                        try {
                            percent = parseFloat(yesterdayValue.replace('%', '').replace('+', ''));
                        } catch(e) {}
                    }
                    
                    if (!isNaN(percent)) {
                        totalProfit += amount * percent / 100;
                    }
                }
            }
            document.getElementById('total-amount').textContent = totalAmount > 0 ? totalAmount.toLocaleString() : '--';
            
            const profitElem = document.getElementById('total-profit');
            if (totalAmount > 0) {
                profitElem.textContent = (totalProfit >= 0 ? '+' : '') + totalProfit.toFixed(2);
                profitElem.className = totalProfit >= 0 ? 'value positive' : 'value negative';
            } else {
                profitElem.textContent = '--';
                profitElem.className = 'value';
            }
            
            const changeElem = document.getElementById('portfolio-change');
            changeElem.textContent = (summary.portfolio_change >= 0 ? '+' : '') + summary.portfolio_change.toFixed(2) + '%';
            changeElem.className = 'value ' + (summary.portfolio_change >= 0 ? 'positive' : 'negative');

            renderPortfolioTable(data.funds);
            renderFundDetails(data.funds);
        }

        function renderPortfolioTable(funds) {
            const tbody = document.querySelector('#portfolio-table tbody');
            let html = '';
            let totalAmount = 0;
            
            for (const fund of funds) {
                if (fund.current_info && fund.fund_info) {
                    totalAmount += fund.fund_info.amount || 0;
                }
            }
            
            let todayHasCount = 0;
            let yesterdayHasCount = 0;
            for (const fund of funds) {
                const yesterdayData = fund.current_info ? fund.current_info.昨日涨跌幅 || {} : {};
                const todayData = fund.current_info ? fund.current_info.今日涨跌幅 || {} : {};
                const yesterdayValue = yesterdayData.value || '--';
                const todayValue = todayData.value || '--';
                if (todayValue !== '--') todayHasCount++;
                if (yesterdayValue !== '--') yesterdayHasCount++;
            }
            const validCount = todayHasCount + yesterdayHasCount;
            const useToday = todayHasCount > validCount / 2;
            
            for (const fund of funds) {
                if (fund.current_info) {
                    const yesterdayData = fund.current_info.昨日涨跌幅 || {};
                    const todayData = fund.current_info.今日涨跌幅 || {};
                    const yesterdayValue = yesterdayData.value || '--';
                    const todayValue = todayData.value || '--';

                    let yesterdayClass = 'neutral';
                    let todayClass = 'neutral';
                    let percent = 0;
                    try {
                        if (yesterdayValue !== '--' && parseFloat(yesterdayValue) > 0) yesterdayClass = 'positive';
                        else if (yesterdayValue !== '--' && parseFloat(yesterdayValue) < 0) yesterdayClass = 'negative';
                        if (todayValue !== '--' && parseFloat(todayValue) > 0) todayClass = 'positive';
                        else if (todayValue !== '--' && parseFloat(todayValue) < 0) todayClass = 'negative';
                        
                        if (useToday && todayValue !== '--') {
                            percent = parseFloat(todayValue.replace('%', '').replace('+', ''));
                        } else if (yesterdayValue !== '--') {
                            percent = parseFloat(yesterdayValue.replace('%', '').replace('+', ''));
                        }
                    } catch(e) {}

                    const amount = fund.fund_info ? fund.fund_info.amount : 0;
                    const profit = amount * percent / 100;
                    const ratio = totalAmount > 0 ? (amount / totalAmount * 100) : 0;
                    
                    const amountStr = amount > 0 ? amount.toLocaleString() : '--';
                    const profitStr = amount > 0 ? (profit >= 0 ? '+' : '') + profit.toFixed(2) : '--';
                    const ratioStr = amount > 0 ? ratio.toFixed(2) + '%' : '--';

                    html += `<tr>
                        <td class="fund-code">${fund.fund_code}</td>
                        <td class="fund-name">${fund.fund_name}</td>
                        <td>${amountStr}</td>
                        <td class="${profit >= 0 ? 'positive' : 'negative'}">${profitStr}</td>
                        <td>${ratioStr}</td>
                        <td class="${yesterdayClass}">${yesterdayValue}</td>
                        <td class="${todayClass}">${todayValue}</td>
                    </tr>`;
                }
            }
            tbody.innerHTML = html || '<tr><td colspan="7">暂无数据</td></tr>';
            sortTable(3);
        }

        function renderFundDetails(funds) {
            const container = document.querySelector('.funds-container');
            let html = '';
            for (const fund of funds) {
                if (fund.current_info) {
                    const info = fund.current_info;
                    
                    const dailyGrowth = info.日增长率 || '--';
                    let todayClass = 'neutral';
                    if (dailyGrowth !== '--') {
                        try {
                            const val = parseFloat(dailyGrowth.replace('%', '').replace('+', ''));
                            if (val > 0) todayClass = 'positive';
                            else if (val < 0) todayClass = 'negative';
                            else todayClass = 'neutral';
                        } catch(e) {}
                    }

                    const todayData = info.今日涨跌幅 || {};
                    const todayValue = todayData.value || '--';

                    let historyTableHtml = '';
                    const periodOrder = ['近1月', '近3月', '近6月', '近1年', '近3年', '近5年', '成立以来', '今年以来'];
                    
                    for (const period of periodOrder) {
                        const returnVal = fund.cumulative_returns ? fund.cumulative_returns[period] : null;
                        const drawdownVal = fund.max_drawdowns ? fund.max_drawdowns[period] : null;
                        
                        let returnStr = '-';
                        let drawdownStr = '-';
                        let returnClass = '';
                        
                        if (returnVal != null && returnVal !== undefined) {
                            returnClass = returnVal >= 0 ? 'positive' : 'negative';
                            returnStr = (returnVal >= 0 ? '+' : '') + returnVal.toFixed(2) + '%';
                        }
                        
                        if (drawdownVal != null && drawdownVal !== undefined) {
                            drawdownStr = '-' + drawdownVal.toFixed(2) + '%';
                        }
                        
                        historyTableHtml += `<tr>
                            <td class="period">${period}</td>
                            <td class="${returnClass}">${returnStr}</td>
                            <td class="negative">${drawdownStr}</td>
                        </tr>`;
                    }
                    if (!historyTableHtml) {
                        historyTableHtml = '<tr><td colspan="3">暂无历史业绩数据</td></tr>';
                    }

                    const purchaseStatus = info.申购状态 || '未知';
                    const redeemStatus = info.赎回状态 || '未知';
                    const fee = info.手续费 || '未知';

                    html += `<div class="fund-card">
                        <div class="fund-header">
                            <h3>${fund.fund_code} - ${fund.fund_name}</h3>
                            <span class="data-source">${fund.data_source || '未知'}</span>
                        </div>
                        <div class="fund-basic-info">
                            <div class="info-grid">
                                <div class="info-item">
                                    <span class="label">单位净值</span>
                                    <span class="value">${info.单位净值 || 'N/A'}</span>
                                </div>
                                <div class="info-item">
                                    <span class="label">日增长率</span>
                                    <span class="value ${todayClass}">${info.日增长率 || '--'}</span>
                                </div>
                                <div class="info-item">
                                    <span class="label">净值日期</span>
                                    <span class="value">${info.净值日期 || 'N/A'}</span>
                                </div>
                                <div class="info-item">
                                    <span class="label">手续费</span>
                                    <span class="value">${fee}</span>
                                </div>
                            </div>
                            <div class="status-info">
                                <div class="status-item">
                                    <span class="label">申购状态</span>
                                    <span class="status-badge open">${purchaseStatus}</span>
                                </div>
                                <div class="status-item">
                                    <span class="label">赎回状态</span>
                                    <span class="status-badge open">${redeemStatus}</span>
                                </div>
                            </div>
                        </div>
                        <div class="history-table-container">
                            <h4>📈 历史业绩</h4>
                            <table class="history-table">
                                <thead>
                                    <tr>
                                        <th>周期</th>
                                        <th>收益率</th>
                                        <th>最大回撤</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${historyTableHtml}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
                }
            }
            container.innerHTML = html || '<div class="no-funds">暂无有效基金数据</div>';
        }

        function initMultiPool() {
            const container = document.getElementById('pool-data');
            if (!container) return;

            try {
                poolData = JSON.parse(container.innerHTML);
            } catch(e) {
                console.error('解析组合数据失败:', e);
                return;
            }

            const poolNames = Object.keys(poolData);
            if (poolNames.length === 0) return;

            const tabsContainer = document.getElementById('pool-tabs');
            if (!tabsContainer) return;
            
            let tabsHtml = '';
            poolNames.forEach((name, idx) => {
                const count = poolData[name].funds.length;
                tabsHtml += `<button class="pool-tab ${idx === 0 ? 'active' : ''}" data-pool="${name}" onclick="switchPool('${name}')">
                    ${name}<span class="pool-count">(${count}只)</span>
                </button>`;
            });
            tabsContainer.innerHTML = tabsHtml;

            currentPool = poolNames[0];
            switchPool(poolNames[0]);
        }

        let sortDirection = { 2: null, 3: null, 4: null, 5: null, 6: null };
        
        function sortTable(columnIndex) {
            const table = document.getElementById("portfolio-table");
            if (!table) return;
            const tbody = table.querySelector("tbody");
            const rows = Array.from(tbody.querySelectorAll("tr"));
            
            if (sortDirection[columnIndex] === null) {
                sortDirection[columnIndex] = false;
            } else {
                sortDirection[columnIndex] = !sortDirection[columnIndex];
            }
            
            const isAsc = sortDirection[columnIndex];
            const headers = table.querySelectorAll("th");
            headers.forEach((th, index) => {
                const icon = th.querySelector(".sort-icon");
                if (icon) icon.textContent = index === columnIndex ? (isAsc ? "↑" : "↓") : "↕";
            });
            
            rows.sort((a, b) => {
                const aText = a.cells[columnIndex].textContent.trim();
                const bText = b.cells[columnIndex].textContent.trim();
                if (aText === "--" || bText === "--") return 0;
                const aVal = parseFloat(aText.replace("%", "").replace("+", ""));
                const bVal = parseFloat(bText.replace("%", "").replace("+", ""));
                if (isNaN(aVal) || isNaN(bVal)) return 0;
                return isAsc ? aVal - bVal : bVal - aVal;
            });
            
            rows.forEach(row => tbody.appendChild(row));
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            initMultiPool();
        });
    </script>

    <script type="application/json" id="pool-data"></script>
</body>
</html>
